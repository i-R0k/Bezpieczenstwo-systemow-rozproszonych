name: ZAP baseline

on:
  workflow_dispatch:

jobs:
  zap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install -r requirements-api.txt

      - name: Start API
        run: |
          PYTHONPATH=VetClinic/API uvicorn vetclinic_api.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8000/bft/observability/health && exit 0
            sleep 2
          done
          exit 1

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: http://localhost:8000
          fail_action: false
          cmd_options: "-a -r zap-baseline-report.html -J zap-baseline-report.json -c pentest/config/zap-baseline.conf"

      - name: Run ZAP API scan
        uses: zaproxy/action-api-scan@v0.9.0
        continue-on-error: true
        with:
          target: http://localhost:8000/openapi.json
          format: openapi
          fail_action: false
          cmd_options: "-r zap-api-report.html -J zap-api-report.json"

      - name: Upload ZAP baseline report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: |
            zap-baseline-report.html
            zap-baseline-report.json

      - name: Upload ZAP API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-api-report
          path: |
            zap-api-report.html
            zap-api-report.json
