syntax = "proto3";

package bft;

message BftEnvelope {
  string message_id = 1;
  string nonce = 2;
  string protocol = 3;
  string message_kind = 4;
  int32 source_node_id = 5;
  int32 target_node_id = 6;
  string operation_id = 7;
  string correlation_id = 8;
  string payload_json = 9;
  string signature_b64 = 10;
  string public_key_b64 = 11;
  int64 created_unix_ms = 12;
}

message Ack {
  bool accepted = 1;
  string reason = 2;
}

message NarwhalBatchMessage {
  string batch_id = 1;
  int32 author_node_id = 2;
  repeated string operation_ids = 3;
  string payload_hash = 4;
  repeated string parent_batch_ids = 5;
}

message NarwhalAckMessage {
  string batch_id = 1;
  int32 voter_node_id = 2;
  bool accepted = 3;
  string reason = 4;
}

message HotStuffProposalMessage {
  string proposal_id = 1;
  string block_id = 2;
  string batch_id = 3;
  int64 view = 4;
  int64 height = 5;
  int32 proposer_node_id = 6;
  string parent_block_id = 7;
  string justify_qc_id = 8;
  string payload_hash = 9;
}

message HotStuffVoteMessage {
  string vote_id = 1;
  string proposal_id = 2;
  string block_id = 3;
  int32 voter_node_id = 4;
  bool accepted = 5;
  string reason = 6;
  int64 view = 7;
}

message SwimPingMessage {
  int32 source_node_id = 1;
  int32 target_node_id = 2;
  string nonce = 3;
  int64 timestamp_unix_ms = 4;
}

message SwimAckMessage {
  int32 source_node_id = 1;
  int32 target_node_id = 2;
  string nonce = 3;
  bool accepted = 4;
  string status = 5;
  int64 incarnation = 6;
  string reason = 7;
}

message StateTransferRequestMessage {
  string request_id = 1;
  int32 requester_node_id = 2;
  int32 source_node_id = 3;
  string checkpoint_id = 4;
  int64 from_height = 5;
}

message StateTransferResponseMessage {
  string request_id = 1;
  int32 source_node_id = 2;
  int32 requester_node_id = 3;
  string checkpoint_id = 4;
  string snapshot_id = 5;
  string state_hash = 6;
  repeated string committed_operation_ids = 7;
}

service BftNodeService {
  rpc SendBatch(NarwhalBatchMessage) returns (Ack);
  rpc SendBatchAck(NarwhalAckMessage) returns (Ack);
  rpc SendProposal(HotStuffProposalMessage) returns (Ack);
  rpc SendVote(HotStuffVoteMessage) returns (Ack);
  rpc SendSwimPing(SwimPingMessage) returns (SwimAckMessage);
  rpc SendSwimGossip(BftEnvelope) returns (Ack);
  rpc SendStateTransferRequest(StateTransferRequestMessage) returns (Ack);
  rpc SendStateTransferResponse(StateTransferResponseMessage) returns (Ack);
}
